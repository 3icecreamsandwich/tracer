name: Build Windows Installer
on:
  workflow_dispatch:
jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      # Ensure tauri.conf.json bundles NSIS installer
      - name: Force bundle target to NSIS
        shell: pwsh
        run: |
          $path = "src-tauri/tauri.conf.json"
          $json = Get-Content $path -Raw | ConvertFrom-Json
          $json.bundle.targets = @("nsis")
          $json | ConvertTo-Json -Depth 100 | Set-Content $path -Encoding UTF8
          Write-Host "Updated bundle.targets to nsis"
      - name: Install dependencies
        run: bun install
      - name: Build Tauri Windows installer
        run: bun run tauri build
      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: tracer-alpha-v0.0.0-f0
          path: src-tauri/target/release/bundle/nsis/*setup*.exe
          if-no-files-found: error