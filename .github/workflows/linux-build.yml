name: Build Linux Installer

on:
  workflow_dispatch:

jobs:
  build-linux-installer:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Ensure tauri.conf.json bundles Linux installer artifacts.
      - name: Force bundle target to Linux packages
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';

          const path = 'src-tauri/tauri.conf.json';
          const config = JSON.parse(readFileSync(path, 'utf8'));
          config.bundle.targets = ['deb', 'appimage'];
          writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          console.log('Updated bundle.targets to deb and appimage');
          EOF

      - name: Install dependencies
        run: bun install

      - name: Build Tauri Linux installer
        run: bun run tauri build

      - name: Upload DEB installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: tracer-linux-deb-installer
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: tracer-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
